services:
  _defaults:
    autowire: true
    autoconfigure: true
    bind:
      $defaultLineage: '%symfinity.ui_kernel.default_lineage%'

  Symfinity\UiKernel\:
    resource: '../src/'
    exclude:
      - '../src/DependencyInjection/'
      - '../src/UiKernelBundle.php'
      - '../src/Page/'
      - '../src/Component/UiComponent.php'
      - '../src/Token/'
      - '../src/Theme/Theme.php'
      - '../src/Theme/ThemeCatalog.php'
      - '../src/Theme/DefinedTheme.php'
      - '../src/Theme/LayoutProfile.php'
      - '../src/Theme/ThemeColorScheme.php'
      - '../src/Theme/ThemePreference.php'

  Symfinity\UiKernel\Renderer\HtmlRenderer: ~

  Symfinity\UiKernel\Profile\SystemProfileRegistry: ~

  Symfinity\UiKernel\Css\CssGenerator: ~

  Symfinity\UiKernel\Theme\ThemeRegistry: ~

  Symfinity\UiKernel\Token\ThemeTokenResolver: ~

  Symfinity\UiKernel\Palette\PalettePageViewModelBuilder: ~

  Symfinity\UiKernel\Twig\UiKernelExtension:
    tags: ['twig.extension']

  Symfinity\UiKernel\Twig\ThemeShellTwigExtension:
    tags: ['twig.extension']

  Symfinity\UiKernel\DataCollector\UiKernelDataCollector:
    tags:
      - { name: data_collector, id: 'ui_kernel', template: '@UiKernel/Collector/ui_kernel.html.twig' }
      - { name: ui_profiler.menu, title: 'UI Kernel', icon: '@UiKernel/Collector/icon.svg' }
