services:
  _defaults:
    autowire: true
    autoconfigure: true

  Symfinity\UiKernel\:
    resource: '../src/'
    exclude:
      - '../src/DependencyInjection/'
      - '../src/UiKernelBundle.php'
      - '../src/Page/'
      - '../src/Component/UiComponent.php'
      - '../src/Token/'
      - '../src/Theme/Theme.php'
      - '../src/Theme/ThemeCatalog.php'
      - '../src/Theme/DefinedTheme.php'
      - '../src/Theme/LayoutProfile.php'

  Symfinity\UiKernel\Renderer\HtmlRenderer: ~

  Symfinity\UiKernel\Profile\SystemProfileRegistry: ~

  Symfinity\UiKernel\Css\CssGenerator: ~

  Symfinity\UiKernel\Theme\ThemeRegistry: ~

  Symfinity\UiKernel\Token\ThemeTokenResolver: ~

  Symfinity\UiKernel\Palette\PalettePageViewModelBuilder: ~

  Symfinity\UiKernel\Twig\UiKernelExtension:
    tags: ['twig.extension']
