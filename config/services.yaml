services:
  _defaults:
    autowire: true
    autoconfigure: true
    bind:
      $defaultLineage: '%symfinity.ui_kernel.default_lineage%'

  Symfinity\UiKernel\:
    resource: '../src/'
    exclude:
      - '../src/DependencyInjection/'
      - '../src/UiKernelBundle.php'
      - '../src/Token/'
      - '../src/Theme/Theme.php'
      - '../src/Theme/ThemeCatalog.php'
      - '../src/Theme/DefinedTheme.php'
      - '../src/Theme/LayoutProfile.php'
      - '../src/Theme/ThemeColorScheme.php'
      - '../src/Theme/ThemePreference.php'

  Symfinity\UiKernel\Profile\SystemProfileRegistry: ~

  Symfinity\UiKernel\Css\CssGenerator: ~

  Symfinity\UiKernel\Theme\ThemeRegistry: ~

  Symfinity\UiKernel\Dtcg\DesignSystemLayerRegistry:
    factory: ['Symfinity\UiKernel\Dtcg\DesignSystemLayerRegistry', 'fromDefaultDirectory']

  Symfinity\UiKernel\Dtcg\BuiltinDtcgThemeCatalog:
    factory: ['Symfinity\UiKernel\Dtcg\BuiltinDtcgThemeCatalog', 'fromDefaultDirectory']

  Symfinity\UiKernel\Dtcg\ProfileGlobalsLayerRegistry:
    arguments:
      $filePath: '%symfinity.ui_kernel.profile_globals_layer_path%'

  Symfinity\UiKernel\Dtcg\LayerStackBuilder: ~

  Symfinity\UiKernel\Dtcg\ThemeDtcgResolver: ~

  Symfinity\UiKernel\Dtcg\AtRulesContributor: ~

  Symfinity\UiKernel\Contract\Emitter\AtRulesContributorInterface: '@Symfinity\UiKernel\Dtcg\AtRulesContributor'

  Symfinity\UiKernel\Css\GraphVariantCatalog: ~

  Symfinity\UiKernel\Contract\Catalog\GraphVariantCatalogPort: '@Symfinity\UiKernel\Css\GraphVariantCatalog'

  Symfinity\UiKernel\Palette\PaletteGenerator: ~

  Symfinity\UiKernel\Palette\PaletteRampSampler: ~

  Symfinity\UiKernel\Palette\PaletteRampSamplerInterface: '@Symfinity\UiKernel\Palette\PaletteRampSampler'

  Symfinity\UiKernel\Twig\UiKernelExtension:
    tags: ['twig.extension']

  Symfinity\UiKernel\Twig\ThemeShellTwigExtension:
    tags: ['twig.extension']

  Symfinity\UiKernel\DataCollector\UiKernelDataCollector:
    tags:
      - { name: data_collector, id: 'ui_kernel', template: '@UiKernel/Collector/ui_kernel.html.twig' }

  Symfinity\UiKernel\Preview\InjectedThemeCssProvider: ~
