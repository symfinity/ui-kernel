palette_contract:
  levels: [100, 200, 300, 400, 500, 600, 700, 800, 900, 950]
  alpha_percent: [0, 5, 10, 15, 25, 40, 50, 60, 75, 100]
  hue_families: [red, orange, yellow, lime, green, emerald, cyan, sky, blue, violet, purple, pink]
  hues: [red, orange, yellow, lime, green, emerald, cyan, sky, blue, violet, purple, pink]
  forbidden_hues: []
  mono_tones: [pure, evil, warm, wood, cool, pope]

palette_generator:
  ramp_levels: [100, 200, 300, 400, 500, 600, 700, 800, 900, 950]
  level_lightness:
    100: 89.0
    200: 80.0
    300: 71.0
    400: 62.0
    500: 53.0
    600: 44.0
    700: 35.0
    800: 26.0
    900: 17.0
    950: 8.0
  level_lightness_pure:
    100: 100.0
    200: 89.0
    300: 78.0
    400: 67.0
    500: 56.0
    600: 45.0
    700: 34.0
    800: 23.0
    900: 12.0
    950: 0.0

presets:
  baseline:
    hue_base:
      red: 0.0
      orange: 30.0
      yellow: 60.0
      lime: 90.0
      green: 120.0
      emerald: 150.0
      cyan: 180.0
      sky: 210.0
      blue: 240.0
      violet: 270.0
      purple: 300.0
      pink: 330.0
    mono_tones:
      pure: { hue: 0.0, saturation: 0.0 }
      evil: { hue: 0.0, saturation: 7.5 }
      warm: { hue: 30.0, saturation: 7.5 }
      wood: { hue: 120.0, saturation: 7.5 }
      cool: { hue: 240.0, saturation: 7.5 }
      pope: { hue: 300.0, saturation: 7.5 }
  semantic:
    extends: baseline
    hue_overrides:
      red: 354.0
      orange: 29.0
      yellow: 45.0
      green: 152.0
      cyan: 190.0
      blue: 215.0
      purple: 263.0
    mono_overrides:
      cool: { hue: 220.0, saturation: 8.0 }
  utility:
    extends: baseline
    hue_overrides:
      red: 0.0
      orange: 25.0
      yellow: 48.0
      green: 142.0
      cyan: 190.0
      blue: 217.0
      purple: 271.0
    mono_overrides:
      cool: { hue: 220.0, saturation: 7.0 }
  kiroshi:
    extends: baseline
    hue_overrides:
      red: 350.0
      orange: 29.0
      yellow: 55.0
      green: 145.0
      cyan: 190.0
      blue: 215.0
      purple: 280.0
    mono_overrides:
      warm: { hue: 32.0, saturation: 8.0 }
      cool: { hue: 215.0, saturation: 8.0 }

themes:
  - id: default
    label: Balanced
    layout: Semantic
    tone: cool
    preset: baseline
    colors:
      primary: sky.600
      secondary: mono.cool.500
      tertiary: pink.800
      surface: mono.pure.100
      surface_elevated: mono.cool.100
      text: mono.cool.900
      text_muted: mono.cool.400
      border: mono.cool.900
      danger: red.600
      success: green.800
      warning: orange.500
      info: cyan.700
      focus: blue.600
      overlay: mono.cool.900@40
      skeleton_base: mono.cool.200
      skeleton_shine: mono.cool.100
  - id: dark
    label: Balanced dark
    layout: Semantic
