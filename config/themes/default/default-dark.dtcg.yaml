color:
  primary:
    $type: color
    $value: '{color.blue.500}'
  secondary:
    $type: color
    $value: '{color.mono.slate.600}'
  tertiary:
    $type: color
    $value: '{color.purple.500}'
  surface:
    base:
      $type: color
      $value: '{color.mono.slate.900}'
    elevated:
      $type: color
      $value: '{color.mono.slate.800}'
  overlay:
    $type: color
    $value: 'rgba(15, 15, 16, 0.4)'
  text:
    default:
      $type: color
      $value: '{color.mono.slate.100}'
    muted:
      $type: color
      $value: '{color.mono.slate.300}'
  border:
    default:
      $type: color
      $value: '{color.mono.slate.600}'
  danger:
    $type: color
    $value: '{color.red.500}'
  success:
    $type: color
    $value: '{color.green.500}'
  warning:
    $type: color
    $value: '{color.orange.500}'
  info:
    $type: color
    $value: '{color.teal.500}'
  focus:
    $type: color
    $value: '{color.blue.500}'
  button:
    text:
      $type: color
      $value: '{color.mono.neutral.50}'
  skeleton:
    base:
      $type: color
      $value: '{color.mono.slate.600}'
    shine:
      $type: color
      $value: '{color.mono.slate.400}'
space:
  xs:
    $type: dimension
    $value: 0.25rem
  sm:
    $type: dimension
    $value: 0.5rem
  md:
    $type: dimension
    $value: 1rem
  lg:
    $type: dimension
    $value: 1.5rem
  xl:
    $type: dimension
    $value: 3rem
  2xl:
    $type: dimension
    $value: 4rem
grid:
  gap:
    $type: unknown
    $value: 1rem
radius:
  xs:
    $type: dimension
    $value: 0.125rem
  sm:
    $type: dimension
    $value: 0.25rem
  md:
    $type: dimension
    $value: 0.375rem
  lg:
    $type: dimension
    $value: 0.5rem
  full:
    $type: dimension
    $value: 9999px
shadow:
  sm:
    $type: unknown
    $value: '0 1px 2px rgba(0, 0, 0, 0.06)'
  md:
    $type: unknown
    $value: '0 4px 12px rgba(0, 0, 0, 0.1)'
  lg:
    $type: unknown
    $value: '0 12px 28px rgba(0, 0, 0, 0.15)'
font:
  family:
    sans:
      $type: unknown
      $value: 'system-ui, -apple-system, "Segoe UI", Roboto, sans-serif'
    mono:
      $type: unknown
      $value: 'ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace'
  size:
    sm:
      $type: dimension
      $value: 0.875rem
    md:
      $type: dimension
      $value: 1rem
    lg:
      $type: dimension
      $value: 1.25rem
  weight:
    normal:
      $type: number
      $value: '400'
    medium:
      $type: number
      $value: '500'
    semibold:
      $type: number
      $value: '600'
line-height:
  tight:
    $type: unknown
    $value: '1.25'
  normal:
    $type: unknown
    $value: '1.5'
  relaxed:
    $type: unknown
    $value: '1.625'
motion:
  duration:
    fast:
      $type: duration
      $value: 150ms
    normal:
      $type: duration
      $value: 450ms
    slow:
      $type: duration
      $value: 1350ms
    skeleton:
      $type: duration
      $value: 1.75s
  easing:
    standard:
      $type: cubicBezier
      $value: 'cubic-bezier(0.4, 0, 0.2, 1)'
    linear:
      $type: cubicBezier
      $value: linear
focus:
  ring:
    width:
      $type: dimension
      $value: 0.25rem
    opacity:
      $type: number
      $value: '0.25'
    blur:
      $type: number
      $value: '0'
