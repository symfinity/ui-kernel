symfinity_ui_kernel:
  themes:
    kiroshi:
      palette:
        hues:
          red: 350.0
          orange: 29.0
          yellow: 55.0
          lime: 90.0
          green: 145.0
          emerald: 150.0
          cyan: 190.0
          sky: 210.0
          blue: 215.0
          violet: 270.0
          purple: 280.0
          pink: 330.0
        mono:
          pure:
            hue: 0.0
            saturation: 0.0
          evil:
            hue: 0.0
            saturation: 7.5
          warm:
            hue: 32.0
            saturation: 8.0
          wood:
            hue: 120.0
            saturation: 7.5
          cool:
            hue: 215.0
            saturation: 8.0
          pope:
            hue: 300.0
            saturation: 7.5
      tokens:
        space:
          xs: 0.125rem
          sm: 0.375rem
          md: 0.625rem
          lg: 1.25rem
          xl: 2rem
          '2xl': 2.75rem
        grid_gap: 0.625rem
        radius:
          xs: '0'
          sm: '0'
          md: '0'
          lg: '0'
          full: 9999px
        shadow:
          sm: '0 1px 2px rgba(0, 0, 0, 0.12)'
          md: '0 4px 8px rgba(0, 0, 0, 0.16)'
          lg: '0 12px 24px rgba(0, 0, 0, 0.2)'
        font:
          family:
            sans: '"Aptos", "Segoe UI", system-ui, sans-serif'
            mono: 'ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace'
          size:
            sm: 0.8125rem
            md: 0.9375rem
            lg: 1.125rem
          weight:
            normal: '400'
            medium: '500'
            semibold: '600'
          line_height:
            tight: '1.25'
            normal: '1.5'
            relaxed: '1.625'
        motion:
          duration:
            fast: 100ms
            normal: 150ms
            slow: 250ms
            skeleton: 1.5s
          easing:
            standard: 'cubic-bezier(0.4, 0, 0.2, 1)'
            linear: linear
        focus:
          ring:
            width: 0.25rem
            opacity: '0.25'
            blur: '0'
      variants:
        kiroshi:
          label: Kiroshi
          tone: warm
          mode: light
          colors:
            brand:
              primary: blue.500
              secondary: purple.500
              tertiary: lime.500
            surface:
              base: yellow.400
              elevated: yellow.500
              overlay: mono.cool.900@40
            text:
              default: mono.pure.900
              muted: mono.pure.700
            border:
              default: mono.pure.900
            state:
              danger: red.500
              success: green.500
              warning: yellow.500
              info: blue.500
              focus: blue.500
            skeleton:
              base: mono.cool.200
              shine: mono.cool.100
        kiroshi_dark:
          extends: kiroshi
          label: 'Kiroshi dark'
          mode: dark
          colors:
            brand:
              primary: blue.600
              secondary: purple.600
              tertiary: lime.600
            surface:
              base: mono.pure.950
              elevated: mono.warm.950
            text:
              default: yellow.600
              muted: mono.pure.400
            border:
              default: mono.pure.800
            state:
              danger: red.600
              success: green.600
              warning: yellow.600
              info: blue.600
              focus: blue.600
            skeleton:
              base: mono.cool.800
              shine: mono.cool.700
