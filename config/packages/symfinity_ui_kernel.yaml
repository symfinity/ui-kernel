# COLOR FREEZE v1 (2026-06-12) — palette generator revision locked until maintainer lift
symfinity_ui_kernel:
  schema_version: '1.0'
  default_theme: default
  default_variant: default
  user_tokens: {}
  contract:
    palette:
      levels: [100, 200, 300, 400, 500, 600, 700, 800, 900, 950]
      alpha: [0, 5, 10, 15, 25, 40, 50, 60, 75, 100]
      hues: [red, orange, yellow, lime, green, emerald, teal, cyan, sky, blue, violet, purple, pink]
      forbidden_hues: []
      mono_tones: [pure, evil, warm, wood, cool, pope]
  generator:
    palette:
      interpolation: oklch
      # FROZEN — built-in lineages use materialized anchor_profile; lift only per palette-freeze.md
      revision: 1
      # OKLCH L (0–1) per contract.palette.levels index — shared hue curve
      lightness_curve:
        default: [0.89, 0.80, 0.71, 0.62, 0.53, 0.44, 0.35, 0.26, 0.17, 0.08]
        pure: [1.00, 0.89, 0.78, 0.67, 0.56, 0.45, 0.34, 0.23, 0.12, 0.00]
      # Base OKLCH chroma at level 500 — in-gamut targets tuned for BS/TW/Balanced refs (rev 1)
      hue_chroma:
        red: 0.200
        orange: 0.145
        yellow: 0.280
        lime: 0.200
        green: 0.175
        emerald: 0.168
        teal: 0.140
        cyan: 0.125
        sky: 0.110
        blue: 0.210
        violet: 0.241
        purple: 0.247
        pink: 0.222
